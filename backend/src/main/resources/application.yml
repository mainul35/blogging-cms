spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/blogcms
    username: bloguser
    password: blogpass
    pool:
      initial-size: 5
      max-size: 20

  # Flyway uses JDBC — separate from R2DBC runtime driver
  flyway:
    url: jdbc:postgresql://localhost:5432/blogcms
    user: bloguser
    password: blogpass
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  webflux:
    multipart:
      # No synchronoss-nio-multipart dependency on the classpath, so Spring
      # Boot falls back to DefaultPartHttpMessageReader -- which has no
      # disk-spill support at all. max-disk-usage-per-part only applies to
      # the Synchronoss-based reader, so setting it here was a silent no-op;
      # max-in-memory-size was the *only* real cap, and at 1MB it rejected
      # any upload above that with a DataBufferLimitException before
      # UploadService's own 5MB check (app.upload.max-size-mb below) ever
      # ran -- most real photos are well over 1MB, so avatar uploads were
      # failing outright. Raised to comfortably exceed the app's actual
      # intended limit; holding a few MB per upload in memory is trivial at
      # this app's scale.
      max-in-memory-size: 6MB

app:
  cors:
    # Comma-separated. Add your frontend's origin here if it's not the default
    # http://localhost:3000 (e.g. a different port, or a real domain in production).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: change-this-to-a-very-long-random-secret-key-at-least-256-bits-long
    expiration-ms: 86400000   # 24 hours
  admin:
    reset-secret: ${ADMIN_RESET_SECRET:change-this-emergency-reset-secret}
  upload:
    dir: ./uploads
    max-size-mb: 5
    allowed-types: image/png,image/jpeg,image/gif,image/webp
  internal:
    # Shared secret between this backend and the frontend's NextAuth server-side
    # callback — must be identical in both places, same operational shape as
    # ADMIN_RESET_SECRET above.
    auth-secret: ${INTERNAL_AUTH_SECRET:change-this-internal-secret}
  # Mail gateway config (provider, SMTP/Resend/SendGrid credentials) lives in
  # the mail_settings DB table now, editable from Settings > Mail or the setup
  # wizard -- see MailSenderRouter. No app.mail.* keys here anymore.
  public-url: ${PUBLIC_URL:http://localhost:8080}      # used to build the confirm-subscription link
  frontend-url: ${FRONTEND_URL:http://localhost:3000}   # used to build the "read the post" digest link

server:
  port: 8080

logging:
  level:
    com.blog.cms: DEBUG
    org.springframework.r2dbc: DEBUG
