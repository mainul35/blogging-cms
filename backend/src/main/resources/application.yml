spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/blogcms
    username: bloguser
    password: blogpass
    pool:
      initial-size: 5
      max-size: 20

  # Flyway uses JDBC — separate from R2DBC runtime driver
  flyway:
    url: jdbc:postgresql://localhost:5432/blogcms
    user: bloguser
    password: blogpass
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  webflux:
    multipart:
      max-in-memory-size: 1MB
      max-disk-usage-per-part: 5MB   # hard backstop — keep >= app.upload.max-size-mb below

app:
  jwt:
    secret: change-this-to-a-very-long-random-secret-key-at-least-256-bits-long
    expiration-ms: 86400000   # 24 hours
  admin:
    default-email: admin@blog.com
    default-password: Admin@1234        # only used by /api/auth/emergency-reset
    reset-secret: ${ADMIN_RESET_SECRET:change-this-emergency-reset-secret}
  upload:
    dir: ./uploads
    max-size-mb: 5
    allowed-types: image/png,image/jpeg,image/gif,image/webp
  internal:
    # Shared secret between this backend and the frontend's NextAuth server-side
    # callback — must be identical in both places, same operational shape as
    # ADMIN_RESET_SECRET above.
    auth-secret: ${INTERNAL_AUTH_SECRET:change-this-internal-secret}
  mail:
    # log | smtp | resend | sendgrid — smtp also covers AWS SES / Mailgun /
    # Postmark via their SMTP relay credentials; no dedicated option needed
    # for those three. "log" (the default) just logs instead of sending.
    provider: log
    from: noreply@example.com
    reply-to: ${MAIL_REPLY_TO:}
    smtp:
      host: ${MAIL_SMTP_HOST:}
      port: ${MAIL_SMTP_PORT:587}
      username: ${MAIL_SMTP_USERNAME:}
      password: ${MAIL_SMTP_PASSWORD:}
      auth: ${MAIL_SMTP_AUTH:true}
      starttls: ${MAIL_SMTP_STARTTLS:true}
    resend:
      api-key: ${RESEND_API_KEY:}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
  public-url: ${PUBLIC_URL:http://localhost:8080}      # used to build the confirm-subscription link
  frontend-url: ${FRONTEND_URL:http://localhost:3000}   # used to build the "read the post" digest link

server:
  port: 8080

logging:
  level:
    com.blog.cms: DEBUG
    org.springframework.r2dbc: DEBUG
