# Single public entry point for the whole app. Only one site is served here
# (Harbor gets its own port -- see docs/deployment/harbor-registry-setup.md --
# so no server_name-based virtual hosting is needed, just path routing.
#
# Routing everything through one origin is what makes the browser's calls to
# the backend same-origin: no CORS, and the admin JWT (sent as an
# Authorization header from localStorage, not a cookie) needs nothing special
# for cross-site handling because there's no cross-site involved anymore.

# Only sets "Connection: upgrade" when the client actually asked for one --
# forcing it on every request (a common copy-paste mistake) breaks normal
# HTTP keep-alive for regular page/API requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Default (1m) is smaller than app.upload.max-size-mb (5MB) -- images
    # would get an nginx 413 before ever reaching the backend's own limit.
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        # NextAuth's OAuth callback URLs and RootLayout's cookies()-based
        # auth check both depend on the frontend seeing the original public
        # Host, not "frontend:3000" -- without this, reader sign-in redirects
        # would loop back to the container's own internal address.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js dev overlay/HMR doesn't run in a production build, but
        # keeping upgrade support costs nothing and avoids surprises if this
        # config ever gets pointed at a `next dev` server for debugging.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
