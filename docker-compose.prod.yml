# Production stack for proxy-vm. Secrets/hostnames come from a .env file
# sitting next to this one on the VM (never committed -- see
# docs/deployment/DEPLOYMENT.md for the full list of required variables).
#
# Jenkins builds+pushes backend/frontend images to Harbor in their own
# pipeline stages (see Jenkinsfile) and this file's `image:` references pick
# those up by tag; `build:` blocks are kept alongside so the same file also
# works for a plain `docker compose up --build` on a dev box without Jenkins
# or Harbor involved at all.
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-blogcms}
      POSTGRES_USER: ${DB_USER:-bloguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [blogcms]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-bloguser} -d ${DB_NAME:-blogcms}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [blogcms]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-harbor.proxy-vm.local:8443}/${HARBOR_PROJECT:-blogging-cms}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    container_name: blog_backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-blogcms}
      SPRING_R2DBC_USERNAME: ${DB_USER:-bloguser}
      SPRING_R2DBC_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-blogcms}
      SPRING_FLYWAY_USER: ${DB_USER:-bloguser}
      SPRING_FLYWAY_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # APP_JWT_SECRET uses the relaxed-binding form (app.jwt.secret has no
      # explicit ${...} placeholder in application.yml, just a hardcoded
      # default) -- env vars still outrank the yml file regardless. The other
      # four below DO have explicit ${VAR_NAME:default} placeholders in
      # application.yml, which resolve against that exact flat name, not the
      # APP_* relaxed-binding form -- must match verbatim.
      APP_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ADMIN_RESET_SECRET: ${ADMIN_RESET_SECRET:?ADMIN_RESET_SECRET must be set in .env}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET must be set in .env}
      CORS_ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN}
      PUBLIC_URL: https://${PUBLIC_DOMAIN}
      FRONTEND_URL: https://${PUBLIC_DOMAIN}
    volumes:
      - backend_uploads:/app/uploads
    networks: [blogcms]
    healthcheck:
      # No actuator dependency in build.gradle -- reuse a real, always-public
      # endpoint (permitAll in SecurityConfig) instead of adding one just for this.
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/mail-settings/status']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${REGISTRY:-harbor.proxy-vm.local:8443}/${HARBOR_PROJECT:-blogging-cms}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8080
        # Must match the public origin edge.conf serves this app on -- baked
        # into the client JS at build time, can't be overridden at container
        # runtime. Changing PUBLIC_DOMAIN always requires a frontend rebuild.
        NEXT_PUBLIC_BACKEND_URL: https://${PUBLIC_DOMAIN}
    container_name: blog_frontend
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    environment:
      BACKEND_URL: http://backend:8080
      NEXTAUTH_URL: https://${PUBLIC_DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET must be set in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    networks: [blogcms]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  edge:
    image: nginx:1.27-alpine
    container_name: blog_edge
    restart: unless-stopped
    depends_on:
      frontend: { condition: service_healthy }
    ports:
      # Loopback-only: cloudflared is the sole public ingress (see
      # docs/deployment/cloudflare-tunnel-setup.md) and reaches this over
      # 127.0.0.1, not the VM's public/LAN interface. Binding to 0.0.0.0
      # here would let anyone who can reach proxy-vm's real IP skip the
      # tunnel entirely and hit the app directly, unencrypted, on port 80.
      - '127.0.0.1:80:80'
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [blogcms]

networks:
  blogcms:

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
