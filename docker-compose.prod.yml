# Production stack for proxy-vm. Secrets/hostnames come from a .env file
# sitting next to this one on the VM (never committed -- see
# docs/deployment/DEPLOYMENT.md for the full list of required variables).
#
# Jenkins builds+pushes backend/frontend images to Harbor in their own
# pipeline stages (see Jenkinsfile) and this file's `image:` references pick
# those up by tag; `build:` blocks are kept alongside so the same file also
# works for a plain `docker compose up --build` on a dev box without Jenkins
# or Harbor involved at all.
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-blogcms}
      POSTGRES_USER: ${DB_USER:-bloguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [blogcms]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-bloguser} -d ${DB_NAME:-blogcms}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [blogcms]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-localhost:5000}/${HARBOR_PROJECT:-blogging-cms}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    container_name: blog_backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-blogcms}
      SPRING_R2DBC_USERNAME: ${DB_USER:-bloguser}
      SPRING_R2DBC_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-blogcms}
      SPRING_FLYWAY_USER: ${DB_USER:-bloguser}
      SPRING_FLYWAY_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # APP_JWT_SECRET uses the relaxed-binding form (app.jwt.secret has no
      # explicit ${...} placeholder in application.yml, just a hardcoded
      # default) -- env vars still outrank the yml file regardless. The other
      # four below DO have explicit ${VAR_NAME:default} placeholders in
      # application.yml, which resolve against that exact flat name, not the
      # APP_* relaxed-binding form -- must match verbatim.
      APP_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ADMIN_RESET_SECRET: ${ADMIN_RESET_SECRET:?ADMIN_RESET_SECRET must be set in .env}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET must be set in .env}
      CORS_ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN}
      PUBLIC_URL: https://${PUBLIC_DOMAIN}
      FRONTEND_URL: https://${PUBLIC_DOMAIN}
    volumes:
      - backend_uploads:/app/uploads
    networks: [blogcms]
    healthcheck:
      # No actuator dependency in build.gradle -- reuse a real, always-public
      # endpoint (permitAll in SecurityConfig) instead of adding one just for this.
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/mail-settings/status']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${REGISTRY:-localhost:5000}/${HARBOR_PROJECT:-blogging-cms}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8080
        # Must match the public origin this container is reached on -- baked
        # into the client JS at build time, can't be overridden at container
        # runtime. Changing PUBLIC_DOMAIN always requires a frontend rebuild.
        NEXT_PUBLIC_BACKEND_URL: https://${PUBLIC_DOMAIN}
    container_name: blog_frontend
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    environment:
      BACKEND_URL: http://backend:8080
      NEXTAUTH_URL: https://${PUBLIC_DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET must be set in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      # This container IS the public entry point -- no separate reverse
      # proxy. next.config.js's own rewrite already forwards /api/* to the
      # backend server-side (see lib/api.ts's server/client BACKEND_URL
      # split), so a dedicated nginx layer in front would be redundant.
      # Loopback-only: Cloudflare Tunnel's cloudflared reaches this over
      # 127.0.0.1 (see docs/deployment/cloudflare-tunnel-setup.md); binding
      # 0.0.0.0 would let anyone reaching proxy-vm's real IP skip the tunnel
      # entirely. Port 2368 replaces the Ghost blog this app supersedes.
      - '127.0.0.1:2368:3000'
    networks: [blogcms]
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves "localhost" to ::1
      # first, and Next's server only binds the IPv4 wildcard -- confirmed
      # directly (wget to 127.0.0.1 succeeds, wget to localhost gets
      # "Connection refused") while chasing deploy-frontend's first-ever
      # failed smoke test. The backend's own healthcheck uses "localhost"
      # and works fine, since Spring/Netty binds dual-stack -- this is
      # specific to Next's server, not a generic container-networking issue.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  blogcms:

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
