version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog_postgres
    environment:
      POSTGRES_DB: blogcms
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bloguser -d blogcms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Local email sandbox — catches every message sent by the backend instead of
  # delivering it, with a web UI to inspect them. Point the backend at it from
  # Settings > Mail (or the setup wizard): provider "smtp", host "localhost",
  # port 1025, auth off, STARTTLS off. Then open http://localhost:8025 to see
  # confirmation/digest emails as they're sent. Not used by default (the
  # mail_settings table seeds provider "log") — opt-in for anyone who wants to
  # see real emails render without a real provider account.
  mailpit:
    image: axllent/mailpit:latest
    container_name: blog_mailpit
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

volumes:
  postgres_data:
  redis_data:
